spring.application.name=demo
# Th\u00f4ng tin k\u1ebft n\u1ed1i PostgreSQL
spring.datasource.url=jdbc:postgresql://localhost:5432/vienthong_cup
spring.datasource.username=postgres
# THAY "admin" B\u1eb0NG M\u1eacT KH\u1ea8U POSTGRES TR\u00caN M\u00c1Y B\u1ea0N:
spring.datasource.password=Thienanh1906@

# Hibernate (JPA) - T\u1ef1 \u0111\u1ed9ng t\u1ea1o b\u1ea3ng t\u1eeb code Java
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.show-sql=true

server.port=8082
# 1. \u0110\u1eadp b\u1ecf c\u00e1c b\u1ea3ng c\u0169 v\u00e0 t\u1ea1o l\u1ea1i b\u1ea3ng m\u1edbi tinh m\u1ed7i khi ch\u1ea1y code
spring.jpa.hibernate.ddl-auto=create

# 2. Cho ph\u00e9p Spring Boot t\u1ef1 \u0111\u1ed9ng ch\u1ea1y file data.sql \u0111\u1ec3 n\u1ea1p d\u1eef li\u1ec7u
spring.sql.init.mode=always

# 3. \u00c9p Spring Boot ph\u1ea3i t\u1ea1o b\u1ea3ng (ddl-auto) XONG R\u1ed2I m\u1edbi \u0111\u01b0\u1ee3c n\u1ea1p data.sql v\u00e0o
spring.jpa.defer-datasource-initialization=true